version: 2
updates:
  # Gradle dependencies (Spring Boot, ASM, JDBC drivers, test libs).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Spring Boot 3.5.x is the supported baseline (see ROADMAP → Platform compatibility).
      # 4.x is a deliberate migration track, not an automated bump — keep receiving 3.5.x
      # patches/minors, but do not propose major jumps. Every explicitly-versioned Spring
      # Boot coordinate in the repo is listed by exact name (no wildcard, to avoid ignoring
      # anything unintended). Starters are BOM-managed (no explicit version) so Dependabot
      # never bumps them and they need no entry. If a new explicitly-versioned Spring Boot
      # coordinate is added, add it here too.
      - dependency-name: "org.springframework.boot"                       # root plugins DSL (build.gradle)
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.springframework.boot:spring-boot-gradle-plugin"  # examples buildscript classpath
        update-types: ["version-update:semver-major"]
      # Shadow 9.x requires Gradle 9.2+ (min Gradle bumped in 9.5.0); this repo runs the
      # Gradle 8.14.x wrapper, so a 9.x bump fails the build (Gradle 9 build API). The
      # Gradle 8 -> 9 upgrade is a deliberate build-toolchain track (see ROADMAP -> Build
      # toolchain), not an automated bump — keep 8.x patches/minors, block 9.x majors.
      - dependency-name: "com.gradleup.shadow"                            # root plugins DSL (build.gradle)
        update-types: ["version-update:semver-major"]

  # GitHub Actions used in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
